name: Build ProxMenux Monitor AppImage

on:

  workflow_dispatch:  
  
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        
    - name: Install dependencies
      working-directory: AppImage
      run: npm install --legacy-peer-deps
      
    - name: Build Next.js app
      working-directory: AppImage
      run: npm run build
      
    - name: Install Python dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip python3-venv
        
    - name: Make build script executable
      working-directory: AppImage
      run: chmod +x scripts/build_appimage.sh
      
    - name: Build AppImage
      working-directory: AppImage
      run: ./scripts/build_appimage.sh
      
    - name: Get version from package.json
      id: version
      working-directory: AppImage
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v7
      with:
        name: ProxMenux-${{ steps.version.outputs.VERSION }}-AppImage
        path: AppImage/dist/*.AppImage
        retention-days: 30

    - name: Generate SHA256 checksum
      working-directory: AppImage/dist
      run: |
        sha256sum *.AppImage > ProxMenux-Monitor.AppImage.sha256
        echo "Generated SHA256:"
        cat ProxMenux-Monitor.AppImage.sha256

    - name: Upload SHA256 checksum
      uses: actions/upload-artifact@v7
      with:
        name: ProxMenux-${{ steps.version.outputs.VERSION }}-sha256
        path: AppImage/dist/*.sha256
        retention-days: 30

    # NOTE (federation branch): the upstream "commit AppImage to main" step is
    # intentionally removed here so building this branch never pushes binaries
    # to main/develop. The built AppImage is available as a downloadable run
    # artifact only.
